# Chapter 5 — CNN-BiLSTM-Attention model comparison
# Two-stage approach: Stage 1 predicts motions from wave H,
#                    Stage 2 predicts mooring force from predicted motions
#
# Original code reference: s5/第五章（上：5.1~5.2混合注意力）.py
#                         s5/第五章（上：5.1~5.2BiLSTM）.py

data:
  data_path: "data/raw/t_2_11.2_50.csv"
  feature_range: [-1.0, 1.0]

  # Stage 1: wave → motion
  wave_feature: "H"
  motion_targets: ["Heave", "Surge", "Pitch"]

  # Stage 2: predicted motions → force
  mooring_target: "Force1"                          # one of: Force1, Force2

  look_back: 500                                    # original s5: 500-step time window
  horizon: 10                                       # prediction horizon (original: 10, 20, 30, 40)
  skip_rows: 3500                                   # original: [3500:, :]
  train_start: 4500
  train_end: 7500                                   # 3000 training samples (aligned)
  valid_end: 12000                                  # 4500 validation samples

mode: "model_compare"                               # model_compare (multi-model) or single

# Stage 1: wave → motion prediction models
stage1:
  epochs: 30
  batch_size: 50
  # Per-motion learning rates (from original Attention/BiLSTM code)
  # These are base rates; LSTM/GRU apply lr_scales to avoid gradient explosion
  learning_rates:
    Heave: 0.1
    Surge: 1.3
    Pitch: 0.35
  # Per-model-type learning rate scale factors
  # Attention/BiLSTM can handle higher rates; LSTM/GRU need lower rates
  lr_scales:
    lstm: 0.05
    gru: 0.03
    bilstm: 1.0
    attention: 1.0
    nbeatsx: 0.01
  # Per-motion train_start (original: Surge uses 4200 for more training data,
  # then trimmed to align with Heave/Pitch at 4500 in Stage 2)
  motion_train_starts:
    Heave: 4500
    Surge: 4200
    Pitch: 4500
  # --- model-specific Stage 1 settings ---
  # LSTM (3-layer)
  lstm_num_layers: 3
  lstm_units: [25, 100, 100]
  lstm_dropout: 0.3
  lstm_activation: "tanh"
  # GRU (3-layer)
  gru_units: [25, 100, 100]
  gru_dropout: 0.3
  gru_activation: "tanh"
  # BiLSTM (1-layer + LeakyReLU)
  bilstm_units: 25
  # Attention (CNN-BiLSTM-Attention)
  attn_conv_filters: 64
  attn_conv_kernel: 1
  attn_lstm_units: 64
  attn_dropout: 0.1
  attn_mode: "permute"
  # N-BEATSx (PyTorch, 第三方模型对比)
  nbeatsx_stack_types: ["trend", "seasonality"]   # 趋势+周期分解，参数少收敛快
  nbeatsx_n_blocks: [2, 2]                        # 每类 stack 的 block 数
  nbeatsx_n_layers: [3, 3]                        # 每 block 的 FC 层数
  nbeatsx_n_hidden: [[64, 64, 64], [64, 64, 64]]    # 每层隐藏单元 (n_layers=3，须3个值/stack)
  nbeatsx_activation: "relu"
  nbeatsx_batch_normalization: true
  nbeatsx_dropout: 0.1
  nbeatsx_shared_weights: false
  nbeatsx_lr_decay: 0.5
  nbeatsx_lr_decay_steps: 5
  nbeatsx_weight_decay: 0.0

# Stage 2: predicted motions → force (BPNN)
stage2:
  model: "bpnn"
  bpnn_units: [150, 150, 150]
  bpnn_activation: "tanh"
  epochs: 1000
  batch_size: 256
  learning_rate: 0.01

# Models to compare in model_compare mode
model:
  compare_models: ["lstm", "gru", "bilstm", "attention", "nbeatsx"]

output:
  output_dir: "results/s5"
  save_predictions: true
  save_figures: true

smoke_test:
  data:
    skip_rows: 3500
    train_end: 4600                               # 100 training samples
    valid_end: 4900                               # 300 validation samples
  stage1:
    epochs: 1
    batch_size: 16
  stage2:
    epochs: 2
    batch_size: 32
  model:
    compare_models: ["lstm", "gru", "attention", "nbeatsx"]  # verify all models in smoke test
