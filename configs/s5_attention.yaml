data:
  data_path: data/raw/t_2_11.2_50.csv
  feature_range:
  - -1.0
  - 1.0
  horizon: 40
  look_back: 500
  mooring_target: Force2
  motion_targets:
  - Heave
  - Surge
  - Pitch
  skip_rows: 3500
  train_end: 7500
  train_start: 4500
  valid_end: 12000
  wave_feature: H
mode: model_compare
model:
  compare_models:
  - lstm
  - gru
  - bilstm
  - attention
  - nbeatsx
output:
  output_dir: results/s5
  save_figures: true
  save_predictions: true
smoke_test:
  data:
    skip_rows: 3500
    train_end: 4600
    valid_end: 4900
  model:
    compare_models:
    - lstm
    - gru
    - bilstm
    - attention
    - nbeatsx
  stage1:
    batch_size: 16
    epochs: 1
  stage2:
    batch_size: 32
    epochs: 2
stage1:
  attn_conv_filters: 64
  attn_conv_kernel: 1
  attn_dropout: 0.1
  attn_lstm_units: 64
  attn_mode: permute
  batch_size: 50
  bilstm_units: 25
  epochs: 30
  gru_activation: tanh
  gru_dropout: 0.3
  gru_units:
  - 25
  - 100
  - 100
  learning_rates:
    Heave: 0.001
    Pitch: 0.01
    Surge: 0.005
  lr_scales:
    attention: 1.0
    bilstm: 1.0
    gru: 0.5
    lstm: 1.0
    nbeatsx: 1.0
  lstm_activation: tanh
  lstm_dropout: 0.0
  lstm_num_layers: 1
  lstm_units:
  - 25
  motion_train_starts:
    Heave: 4500
    Pitch: 4500
    Surge: 4200
  nbeatsx_activation: relu
  nbeatsx_batch_normalization: true
  nbeatsx_dropout: 0.1
  nbeatsx_lr_decay: 0.5
  nbeatsx_lr_decay_steps: 5
  nbeatsx_n_blocks:
  - 2
  - 2
  nbeatsx_n_hidden:
  - - 64
    - 64
    - 64
  - - 64
    - 64
    - 64
  nbeatsx_n_layers:
  - 3
  - 3
  nbeatsx_shared_weights: false
  nbeatsx_stack_types:
  - trend
  - seasonality
  nbeatsx_weight_decay: 0.0
stage2:
  batch_size: 256
  bpnn_activation: tanh
  bpnn_units:
  - 150
  - 150
  - 150
  epochs: 1000
  learning_rate: 0.001
  model: bpnn
